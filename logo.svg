<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 620" fill="none">
  <defs>
    <style>
      .ink {
        stroke: #0f2240;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .fill-hull {
        fill: #cde8f7;
        stroke: #0f2240;
        stroke-width: 2.5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .fill-sail-light {
        fill: #ddf0fb;
        stroke: #0f2240;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .fill-sail-mid {
        fill: #b8dff5;
        stroke: #0f2240;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .fill-navy {
        fill: #1a4a7a;
        stroke: #0f2240;
        stroke-width: 1.5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .fill-dark {
        fill: #0f2240;
      }
      .rigging {
        stroke: #0f2240;
        fill: none;
        stroke-width: 1.5;
        stroke-linecap: round;
      }
    </style>
  </defs>

