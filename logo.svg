  <!-- ═══════════════════════════════════ -->
  <rect x="340" y="22" width="7" height="330" rx="3" fill="#0F2240" />
  <!-- Second mast (mizzen), shorter, slightly right -->
  <rect x="440" y="80" width="6" height="240" rx="3" fill="#0F2240" />

